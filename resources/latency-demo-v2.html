<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Latency Demo   </title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #f5f5f3;
      border-bottom: 0.5px solid rgba(0,0,0,0.15);
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 500;
      width: 100%;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      width: 30%;
      border-right: 0.5px solid rgba(0,0,0,0.15);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #sidebar p {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .test-btn {
      width: 100%;
      padding: 9px 14px;
      font-size: 13px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #ffffff;
      color: #555;
      cursor: default;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .test-btn.active {
      cursor: pointer;
      background: #ffffff;
      color: #1a1a1a;
      border-color: rgba(0,0,0,0.3);
    }

    .test-btn.active:hover {
      background: #f5f5f3;
    }

    .test-btn.inactive {
      background: #f5f5f3;
      color: #aaa;
      border-color: rgba(0,0,0,0.1);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(0,0,0,0.2);
    }

    .test-btn.active .dot { background: #1D9E75; }
    .test-btn.inactive .dot { background: rgba(0,0,0,0.1); }

    .delay-tag {
      margin-left: auto;
      font-size: 11px;
      color: #aaa;
    }

    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #response-panel {
      flex: 1;
      border-bottom: 0.5px solid rgba(0,0,0,0.15);
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      margin-bottom: 12px;
    }

    #response-box {
      flex: 1;
      background: #f5f5f3;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.1);
      padding: 14px;
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      min-height: 160px;
      overflow-y: auto;
    }

    #response-text {
      color: #1a1a1a;
    }

    #response-image {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    #response-image img {
      max-width: 100%;
      max-height: 340px;
      border-radius: 6px;
      border: 0.5px solid rgba(0,0,0,0.1);
      object-fit: contain;
      display: block;
    }

    #response-image .image-caption {
      font-size: 12px;
      color: #aaa;
    }

    #spinner {
      display: none;
      align-items: center;
      gap: 8px;
      color: #aaa;
      font-size: 13px;
    }

    .spinner-dots {
      display: flex;
      gap: 4px;
    }

    .spinner-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1s infinite;
    }

    .spinner-dots span:nth-child(2) { animation-delay: 0.15s; }
    .spinner-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    #request-panel {
      padding: 14px 16px;
      background: #ffffff;
    }

    #request-panel .panel-label {
      margin-bottom: 10px;
    }

    .prompt-btn {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 7px;
      font-size: 13px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #ffffff;
      color: #1a1a1a;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
    }

    .prompt-btn:last-child { margin-bottom: 0; }
    .prompt-btn:hover { background: #f5f5f3; }
    .prompt-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #active-mode {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>Latency Demo 網路延遲演示</header>

  <div id="main">
    <div id="sidebar">
      <p>Select latency mode 選擇络延模式</p>
      <button class="test-btn inactive" id="btn-t1" onclick="selectTest(1)">
        <span class="dot"></span> Test 1 測試一
      </button>
      <button class="test-btn active" id="btn-t2" onclick="selectTest(2)">
        <span class="dot"></span> Test 2 測試二
      </button>
      <button class="test-btn active" id="btn-t3" onclick="selectTest(3)">
        <span class="dot"></span> Test 3 測試三
      </button>
      <div id="active-mode">Active 已激活: <strong>Test 1</strong></div>
    </div>

    <div id="content">
      <div id="response-panel">
        <div class="panel-label">Response 回應</div>
        <div id="response-box">
          <div id="spinner">
            <div class="spinner-dots"><span></span><span></span><span></span></div>
            <span id="spinner-label">Waiting 請稍等...</span>
          </div>
          <div id="response-text" style="color: #aaa;">Select a prompt below to see the response here. 選擇下方的提示以在此查看回應。</div>
          <div id="response-image">
            <img id="response-img-el" src="" alt="Generated image" />
            <span class="image-caption" id="response-img-caption"></span>
          </div>
        </div>
      </div>

      <div id="request-panel">
        <div class="panel-label">Prompts 提示</div>
        <button class="prompt-btn" onclick="askQuestion(0)">(Prompt 1 提示1) What are Shakespeare's least famous plays? 莎士比亞最不知名的劇作有哪些?</button>
        <button class="prompt-btn" onclick="askQuestion(1)">(Prompt 2 提示2) Generate a cozy Japanese coffee shop at night, seen through a rain-streaked window, warm amber lighting inside, steam rising from cups, a few patrons reading books, neon reflections on the wet street outside, cinematic photography style, shallow depth of field, moody atmosphere. 「生成一間溫馨的日本咖啡店夜景，透過雨水斑駁的窗戶看到，室內暖色琥珀燈光，杯子裡冒著熱氣，幾位顧客在閱讀書籍，濕潤街道上有霓虹燈反射，電影攝影風格，淺景深，氣氛憂鬱而迷人。」</button>
        <button class="prompt-btn" onclick="askQuestion(2)">(Prompt 3 提示3) What countries have the longest lasting political systems? 哪些國家的政治制度持續時間最長？</button>
      </div>
    </div>
  </div>

  <script>
    const latencySpeeds = {
      1: ['3 seconds 3秒', '6 seconds 6秒', '6 seconds 6秒'],
      2: ['Instant 立即', '1 second 1秒', '5 seconds 5秒'],
      3: ['9 seconds 9秒', '12 seconds 12秒', '20 seconds 20秒']
    };

    // null signals "show image instead of text" for question 2
    const responses = [
      `Shakespeare's Least Famous Plays 莎士比亞最不知名的劇作

Comedies 喜劇
• The Two Gentlemen of Verona – 維羅納的兩位紳士
• The Merry Wives of Windsor – 溫莎的快活妻子
• Love's Labour's Lost – 愛的徒勞

Histories 歷史劇
• King John – 約翰王
• Henry VI, Part 1 – 亨利六世 第一部
• Henry VI, Part 2 – 亨利六世 第二部
• Henry VI, Part 3 – 亨利六世 第三部
• Henry VIII – 亨利八世

Tragedies / Dark Plays 悲劇 / 陰暗劇
• Timon of Athens – 雅典的提蒙
• Coriolanus – 科里奧蘭納斯
• Troilus and Cressida – 特洛伊羅斯與克瑞西達

Late Romances 晚期浪漫劇
• Cymbeline – 辛白林
• Pericles, Prince of Tyre – 泰爾王子佩里克利斯
• The Two Noble Kinsmen – 高貴的兩位親戚`,

      null, // Question 2 → image response

      `When we talk about longest-lasting political systems, we usually mean countries where the form of government, constitution, or ruling institutions have remained stable for centuries. This can refer to monarchies, republics, or other governance structures. Here are some notable examples:
當我們談論最長久的政治制度時，通常指的是那些政府形式、憲法或統治機構數百年來保持穩定的國家。這可以指君主制、共和制或其他治理結構。以下是一些著名的例子：

1. San Marino
   • System: Republic 制度：共和國
   • Established: 301 AD 成立時間：公元301年
   • Notes: Often considered the world's oldest surviving republic. Its government structure—a council-based system—has existed with remarkable continuity. 說明：常被認為是世界上最古老的現存共和國。其政府結構——基於議會的制度——已持續存在，且延續性極高。

2. United Kingdom
   • System: Constitutional monarchy with parliamentary democracy 制度：君主立憲制與議會民主
   • Key Dates: Monarchy traceable to 9th–10th century; Parliament evolved since 13th century 重要年份：君主制可追溯至9–10世紀；議會自13世紀起逐步演變
   • Notes: The monarchy has persisted for over a millennium, and parliamentary institutions have evolved without interruption. 說明：君主制度延續超過千年，議會制度演變過程中未曾中斷。

3. Japan
   • System: Constitutional monarchy (Emperor as head of state) 制度：君主立憲制（天皇為國家元首）
   • Established: Emperor lineage traced to 660 BC (traditional); modern constitutional monarchy established 1889 成立時間：天皇世系可追溯至公元前660年（傳統說法）；現代君主立憲制於1889年建立
   • Notes: Japan has the world's oldest continuing hereditary monarchy. Even after modernization and constitutional changes, the imperial system remains unbroken. 說明：日本擁有世界上最古老且持續的世襲君主制度。即使經過現代化與憲政改革，天皇制度仍未中斷。

4. Switzerland
   • System: Federal directorial republic 制度：聯邦執行官制共和國
   • Established: 1291 (Old Swiss Confederacy) 成立時間：1291年（舊瑞士邦聯）
   • Notes: Known for its federal system and political stability, Switzerland has maintained a largely consistent republican form for over 700 years. 說明：瑞士以其聯邦制度與政治穩定著稱，700多年來大致保持一致的共和制度。

5. Iceland
   • System: Republic (originally Althing parliament under Norwegian/Danish rule) 制度：共和國（最初為挪威/丹麥統治下的阿爾辛議會）
   • Established: 930 AD (Althing founded) 成立時間：公元930年（阿爾辛議會成立）
   • Notes: The Althing is one of the world's oldest parliamentary institutions. Iceland's democratic institutions have evolved continuously. 說明：阿爾辛議會是世界上最古老的議會機構之一。冰島的民主制度持續演變且未中斷。

Key Observations 關鍵觀察：
• Monarchies can last millennia if succession is uninterrupted (Japan, UK). 君主制若繼承不中斷，可以延續千年以上（如日本、英國）。
• Republics with decentralized governance and rule of law can survive centuries (San Marino, Switzerland). 共和國若採去中心化治理並遵守法治，也能延續數百年（如聖馬力諾、瑞士）。
• Continuity often depends on adaptation, not rigid adherence—institutions evolve while maintaining core legitimacy. 制度的持續性通常依賴於「適應性」，而非死板遵守——制度會演變，同時保持核心合法性。`
    ];

    const IMAGE_PATH = 'https://haydencantcode.github.io/Hayden-Cant-Website/resources/testimage.png';

    const delays = {
      1: [3000, 6000, 6000],
      2: [0, 1000, 5000],
      3: [9000, 12000, 20000]
    };
    let activeTest = 1;
    let pendingTimeout = null;

    function selectTest(n) {
      if (n === activeTest) return;
      activeTest = n;
      [1, 2, 3].forEach(i => {
        const btn = document.getElementById('btn-t' + i);
        btn.className = 'test-btn ' + (i === n ? 'inactive' : 'active');
      });
      document.getElementById('active-mode').innerHTML = 'Active 已激活: <strong>Test ' + n + '</strong>';
    }

    function askQuestion(idx) {
      if (pendingTimeout) clearTimeout(pendingTimeout);
      const btns = document.querySelectorAll('.prompt-btn');
      btns.forEach(b => b.disabled = true);

      const spinner = document.getElementById('spinner');
      const responseText = document.getElementById('response-text');
      const responseImage = document.getElementById('response-image');
      const delay = delays[activeTest][idx];
      const label = delay <= 0 ? 'Responding instantly...' : 'Thinking 思考';

      spinner.style.display = 'flex';
      document.getElementById('spinner-label').textContent = label;
      responseText.style.display = 'none';
      responseImage.style.display = 'none';

      pendingTimeout = setTimeout(() => {
        spinner.style.display = 'none';

        if (responses[idx] === null) {
          // Image response for question 2
          const imgEl = document.getElementById('response-img-el');
          const captionEl = document.getElementById('response-img-caption');
          imgEl.src = IMAGE_PATH;
          captionEl.textContent = latencySpeeds[activeTest][idx] + ' · ' + IMAGE_PATH;
          responseImage.style.display = 'flex';
        } else {
          responseText.style.display = 'block';
          responseText.style.color = '#1a1a1a';
          responseText.style.whiteSpace = 'pre-wrap';
          responseText.textContent = latencySpeeds[activeTest][idx] + '\n\n' + responses[idx];
        }

        btns.forEach(b => b.disabled = false);
      }, delay);
    }
  </script>

</body>
</html>
